  <script>
  // ==== THE BORROWED BOARD — Supabase-powered lending overlay ====
  // Waits for GameCache to finish rendering before initializing.

  const BB_SUPABASE_URL = "https://uhgltoavaurjdtmitflh.supabase.co";
  const BB_SUPABASE_KEY = "sb_publishable_6iRV_CvCKF_2woEafPU8WQ_lbBO3-os";
  const BB_ADMIN_PIN    = "2485";

  let bbBorrowed       = {};   // { game_name: {name, email, dateOut, id} }
  let bbLog            = [];
  let bbIsAdmin        = false;
  let bbActiveGame     = null;
  let bbPinEntry       = "";

  // ---- SUPABASE ----
  async function bbSupabase(path, options = {}) {
    const res = await fetch(BB_SUPABASE_URL + "/rest/v1/" + path, {
      ...options,
      headers: {
        "apikey": BB_SUPABASE_KEY,
        "Authorization": "Bearer " + BB_SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": options.prefer || "return=representation",
        ...(options.headers || {})
      }
    });
    const text = await res.text();
    if (!res.ok) throw new Error(text);
    return text ? JSON.parse(text) : null;
  }

  async function bbLoadBorrowed() {
    try {
      const rows = await bbSupabase("lending?select=*&status=eq.checked_out");
      bbBorrowed = {};
      (rows || []).forEach(r => {
        bbBorrowed[r.game_name] = { name: r.borrower_name, email: r.borrower_email, dateOut: r.checked_out_at ? new Date(r.checked_out_at).toLocaleDateString() : "", id: r.id };
      });
    } catch(e) { console.error("BB load error:", e); }
  }

  async function bbLoadLog() {
    try {
      const rows = await bbSupabase("lending?select=*&order=id.desc&limit=200");
      bbLog = rows || [];
    } catch(e) { console.error("BB log error:", e); }
  }

  // ---- HTML ----
  function bbInjectHTML() {
    document.body.insertAdjacentHTML("beforeend", `
      <button id="bb-fab" onclick="bbOpen('main')">🎲 Borrow / Admin</button>
      <div id="bb-overlay"><div id="bb-modal"></div></div>
      <div id="bb-toast"></div>
    `);
    document.getElementById("bb-overlay").addEventListener("click", e => { if (e.target.id === "bb-overlay") bbClose(); });
  }

  // ---- TOAST ----
  function bbToast(msg) {
    const t = document.getElementById("bb-toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  // ---- MODAL ----
  window.bbOpen = function(screen) {
    document.getElementById("bb-overlay").classList.add("open");
    const m = document.getElementById("bb-modal");
    if (screen === "main")   m.innerHTML = bbRenderMain();
    if (screen === "borrow") m.innerHTML = bbRenderBorrow();
    if (screen === "pin")    m.innerHTML = bbRenderPin();
    if (screen === "admin")  m.innerHTML = bbRenderAdmin();
    if (screen === "log")    m.innerHTML = bbRenderLog();
  };
  window.bbClose = function() {
    document.getElementById("bb-overlay").classList.remove("open");
    bbActiveGame = null;
  };

  // ---- SCREENS ----
  function bbRenderMain() {
    const n = Object.keys(bbBorrowed).length;
    return `<h2>🎲 The Borrowed Board</h2>
      <p class="bbs">${n > 0 ? n + " game" + (n!==1?"s":"") + " currently borrowed" : "All games are available!"}</p>
      <div class="bb-actions" style="flex-direction:column;">
        <button class="bb-btn bb-green" onclick="bbOpen('borrow')">📦 Borrow a Game</button>
        <button class="bb-btn bb-purple" onclick="bbOpen('${bbIsAdmin?"admin":"pin"}')">${bbIsAdmin?"⚙️ Admin Panel":"🔐 Admin Login"}</button>
        <button class="bb-btn bb-gray" onclick="bbClose()">Close</button>
      </div>`;
  }

  function bbRenderBorrow() {
    const games = bbGetGameNames();
    const items = games.map(name => {
      const out = bbBorrowed[name];
      const status = out
        ? `<span class="bb-status" style="background:#fde0e0;color:#b81c1c;">Out</span>`
        : `<span class="bb-status" style="background:#d4f7ec;color:#0a7a56;">In</span>`;
      return `<div class="bb-item${bbActiveGame===name?" sel":""}" data-name="${bbEA(name)}" onclick="bbSelectGame('${bbEA(name)}')">${bbEH(name)} ${status}</div>`;
    }).join("");
    return `<h2>📦 Borrow a Game</h2>
      <p class="bbs">Select a game, then fill in your details.</p>
      <input type="text" id="bb-search" placeholder="🔍 Search..." oninput="bbFilter()" style="margin-bottom:.5rem;">
      <div class="bb-list">${items||'<div class="bb-empty">No games found</div>'}</div>
      <label>Your Name</label><input type="text" id="bb-name" placeholder="Jane Smith">
      <label>Your Email</label><input type="email" id="bb-email" placeholder="jane@example.com">
      <div class="bb-actions">
        <button class="bb-btn bb-gray" onclick="bbOpen('main')">← Back</button>
        <button class="bb-btn bb-green" id="bb-confirm-btn" onclick="bbConfirmBorrow()">Confirm Borrow ✅</button>
      </div>`;
  }

  function bbRenderPin() {
    return `<h2>🔐 Admin Login</h2>
      <p class="bbs">Enter your 4-digit PIN.</p>
      <div class="bb-pin-disp" id="bb-pin-disp">····</div>
      <div class="bb-pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="bb-pin-btn" onclick="bbPin('${n}')">${n}</button>`).join("")}
        <button class="bb-pin-btn" onclick="bbPin('clear')">⌫</button>
        <button class="bb-pin-btn" onclick="bbPin('0')">0</button>
        <button class="bb-pin-btn" onclick="bbPin('ok')">✓</button>
      </div>
      <div class="bb-pin-err" id="bb-pin-err"></div>
      <div class="bb-actions"><button class="bb-btn bb-gray" onclick="bbOpen('main')">← Back</button></div>`;
  }

  function bbRenderAdmin() {
    const entries = Object.entries(bbBorrowed);
    const html = entries.length === 0
      ? `<div class="bb-empty">No games currently borrowed 🎉</div>`
      : entries.map(([game, info]) => `
          <div class="bb-out-item">
            <div class="bb-out-info">📦 ${bbEH(game)}<span>By ${bbEH(info.name)} · Out since ${info.dateOut}</span></div>
            <button class="bb-btn bb-red" style="flex:0;min-width:80px;font-size:.8rem;" onclick="bbDoReturn('${bbEA(game)}')">Return 🔄</button>
          </div>`).join("");
    return `<h2>⚙️ Admin Panel</h2>
      <p class="bbs">Manage checkouts. PIN-protected.</p>
      <h3 style="font-size:1rem;font-weight:800;margin-bottom:.5rem;">Currently Out</h3>
      ${html}
      <div class="bb-actions">
        <button class="bb-btn bb-gray" onclick="bbOpen('main')">← Back</button>
        <button class="bb-btn bb-purple" onclick="bbOpenLog()">📋 Log</button>
        <button class="bb-btn bb-gray" onclick="bbLogout()">🔒 Lock</button>
      </div>`;
  }

  function bbRenderLog() {
    const rows = bbLog.map(e=>`<tr>
      <td>${bbEH(e.game_name)}</td><td>${bbEH(e.borrower_name)}</td>
      <td>${bbEH(e.borrower_email)}</td><td>${e.checked_out_at ? new Date(e.checked_out_at).toLocaleDateString() : "—"}</td><td>${e.returned_at ? new Date(e.returned_at).toLocaleDateString() : "—"}</td>
    </tr>`).join("");
    return `<h2>📋 Borrow Log</h2>
      <p class="bbs">Full history from Supabase.</p>
      ${bbLog.length===0?`<div class="bb-empty">No history yet!</div>`:`
      <div style="overflow-x:auto;"><table class="bb-log-table">
        <thead><tr><th>Game</th><th>Borrower</th><th>Email</th><th>Out</th><th>In</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
      <div class="bb-actions"><button class="bb-btn bb-gray" onclick="bbOpen('admin')">← Back</button></div>`;
  }

  // ---- ACTIONS ----
  window.bbFilter = function() {
    const q = document.getElementById("bb-search").value.toLowerCase();
    document.querySelectorAll(".bb-item").forEach(el => {
      el.style.display = el.dataset.name.toLowerCase().includes(q) ? "" : "none";
    });
  };

  window.bbSelectGame = function(name) {
    if (bbBorrowed[name]) { bbToast("That game is already checked out!"); return; }
    bbActiveGame = name;
    document.querySelectorAll(".bb-item").forEach(el => el.classList.toggle("sel", el.dataset.name===name));
  };

  window.bbConfirmBorrow = async function() {
    if (!bbActiveGame) { bbToast("Please select a game first!"); return; }
    const name  = document.getElementById("bb-name").value.trim();
    const email = document.getElementById("bb-email").value.trim();
    if (!name || !email) { bbToast("Please enter your name and email!"); return; }
    if (!email.includes("@")) { bbToast("Please enter a valid email!"); return; }
    const gameName = bbActiveGame;
    const btn = document.getElementById("bb-confirm-btn");
    btn.textContent = "Saving..."; btn.disabled = true;
    try {
      await bbSupabase("lending", {
        method: "POST",
        body: JSON.stringify({ game_name: gameName, borrower_name: name, borrower_email: email, status: "checked_out", checked_out_at: new Date().toISOString() }),
        prefer: "return=representation"
      });
      await bbLoadBorrowed();
      bbUpdateBadges();
      bbActiveGame = null;
      bbToast(`"${gameName}" checked out to ${name}! 🎉`);
      bbOpen("main");
    } catch(e) {
      bbToast("Error saving — check console.");
      console.error(e);
      btn.textContent = "Confirm Borrow ✅"; btn.disabled = false;
    }
  };

  window.bbDoReturn = async function(game) {
    try {
      await bbSupabase("lending?game_name=eq." + encodeURIComponent(game) + "&status=eq.checked_out", {
        method: "PATCH",
        body: JSON.stringify({ status: "available", returned_at: new Date().toISOString() }),
        prefer: "return=minimal"
      });
      await bbLoadBorrowed();
      bbUpdateBadges();
      bbToast(`"${game}" returned! 🎲`);
      bbOpen("admin");
    } catch(e) {
      bbToast("Error updating — check console.");
      console.error(e);
    }
  };

  window.bbPin = function(val) {
    if (val==="clear") bbPinEntry = bbPinEntry.slice(0,-1);
    else if (val==="ok") {
      if (bbPinEntry === BB_ADMIN_PIN) {
        bbIsAdmin = true; bbPinEntry = "";
        document.getElementById("bb-fab").classList.add("bb-admin");
        bbOpen("admin");
      } else {
        document.getElementById("bb-pin-err").textContent = "Incorrect PIN. Try again.";
        bbPinEntry = "";
      }
    } else { if (bbPinEntry.length < 4) bbPinEntry += val; }
    const d = document.getElementById("bb-pin-disp");
    if (d) d.textContent = "●".repeat(bbPinEntry.length) + "·".repeat(4-bbPinEntry.length);
  };

  window.bbLogout = function() {
    bbIsAdmin = false; bbPinEntry = "";
    document.getElementById("bb-fab").classList.remove("bb-admin");
    bbOpen("main");
  };

  window.bbOpenLog = async function() {
    await bbLoadLog();
    bbOpen("log");
  };

  // ---- BADGES ----
  function bbGetGameNames() {
    const names = new Set();
    document.querySelectorAll(".game-title").forEach(el => {
      const t = el.textContent.trim();
      if (t.length > 1 && t.length < 120) names.add(t);
    });
    return [...names].sort();
  }

  function bbUpdateBadges() {
    document.querySelectorAll(".game-card").forEach(card => {
      const nameEl = card.querySelector(".game-title");
      if (!nameEl) return;
      const gn = nameEl.textContent.trim();

      // Remove any existing badge
      card.querySelectorAll(".bb-badge").forEach(b => b.remove());

      // Only add badge on the summary (thumbnail) if checked out
      if (bbBorrowed[gn]) {
        const summary = card.querySelector(".game-summary");
        if (summary) {
          summary.style.position = "relative";
          const badge = document.createElement("div");
          badge.className = "bb-badge bb-badge-borrowed bb-thumb-badge";
          badge.textContent = "📦 Out";
          summary.appendChild(badge);
        }
      }
    });
  }

  // ---- UTILS ----
  function bbEH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function bbEA(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,"&quot;"); }

  // ---- INIT ----
  // Polls until GameCache has rendered at least one game card, then starts.
  function bbWaitAndInit() {
    const hits = document.getElementById("hits");
    if (hits && hits.querySelector(".game-card")) {
      bbInjectCSS();
      bbInjectHTML();
      bbLoadBorrowed().then(() => {
        bbUpdateBadges();
        // Watch #hits for GameCache re-renders (pagination/filters)
        new MutationObserver(bbUpdateBadges).observe(hits, { childList: true, subtree: false });
      });
    } else {
      setTimeout(bbWaitAndInit, 500);
    }
  }
  bbWaitAndInit();
  </script>
</body>
</html>
